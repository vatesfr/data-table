<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>data-table Demo — Vanilla</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      /* --color-* tokens aren't defined here: @vates/data-table-vanilla injects its own
         stylesheet (built from the same tokens) the first time createDataTable() runs. */

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
