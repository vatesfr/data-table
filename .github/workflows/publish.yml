name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OIDC trusted publishing and npm provenance
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >=11.5.1, newer than what Node 22 bundles
      - run: npm install -g npm@latest

      - run: npm ci

      # Run the full CI suite before publishing
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run type-check
      - run: npm run build

      - run: npm publish -w packages/core --provenance --access public
      - run: npm publish -w packages/react --provenance --access public
      - run: npm publish -w packages/vue --provenance --access public
      - run: npm publish -w packages/vanilla --provenance --access public
